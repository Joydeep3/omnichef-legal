<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniChef — Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#F6F7F8; --paper-card:#FFFFFF; --ink:#14151A; --ink-soft:#6C7078; --line:#E4E6E9; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; }
  .wrap{ max-width:480px; margin:0 auto; padding:64px 24px; text-align:center; }
  h1{ font-size:24px; font-weight:700; margin-bottom:24px; }
  a.card{
    display:block; background:var(--paper-card); border:1px solid var(--line); border-radius:10px;
    padding:16px 20px; margin-bottom:12px; text-decoration:none; color:var(--ink); font-weight:600;
    font-size:15px;
  }
  a.card:hover{ border-color:var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <h1>OmniChef — Legal</h1>
  <a class="card" href="./privacy-policy.html">Privacy Policy</a>
  <a class="card" href="./terms-of-service.html">Terms of Service</a>
</div>
</body>
</html>
